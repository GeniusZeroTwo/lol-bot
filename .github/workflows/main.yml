name: Build and Package

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore HopiBot.sln

      - name: Build (Release)
        run: msbuild HopiBot.sln /m /p:Configuration=Release /p:Platform="Any CPU"

      - name: Prepare package directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item -Path "HopiBot/bin/Release/*" -Destination "artifacts" -Recurse -Force

      - name: Create zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/*" -DestinationPath "HopiBot-Release.zip" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: HopiBot-Release
          path: HopiBot-Release.zip
          retention-days: 30
