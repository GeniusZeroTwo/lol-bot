name: PR Build

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build (net48 / Windows)
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore HopiBot.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (Release)
        run: msbuild HopiBot.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Archive Release output
        shell: pwsh
        run: |
          $artifactDir = "artifacts"
          $zipPath = Join-Path $artifactDir "HopiBot-Release.zip"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "HopiBot/bin/Release/*" -DestinationPath $zipPath

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HopiBot-Release
          path: artifacts/HopiBot-Release.zip
